<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهرجان تجمع فان كوخ - طاهر دوهان</title>
    <style>
        :root { --primary: #0f172a; --accent: #b45309; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; text-align: right; }
        .container { max-width: 700px; background: #fff; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .header p { color: var(--accent); font-weight: bold; font-size: 18px; margin: 8px 0; }

        /* العداد المحدث */
        .countdown-wrap { background: var(--primary); color: #fff; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        #timer { display: flex; justify-content: center; gap: 15px; font-size: 18px; font-weight: bold; }
        .t-box { display: flex; flex-direction: column; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; min-width: 60px; }
        .t-label { font-size: 11px; font-weight: normal; margin-top: 4px; }

        .section-title { background: #f1f5f9; padding: 10px; border-right: 5px solid var(--accent); margin: 25px 0 15px; font-weight: bold; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 15px; font-family: inherit; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .btn-submit { width: 100%; background: var(--primary); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { background: #1e293b; transform: scale(1.01); }
        .btn-submit:disabled { background: #64748b; cursor: not-allowed; }
        
        #id_num_container { display: none; margin-top: 10px; border: 1px dashed var(--accent); padding: 10px; border-radius: 10px; background: #fffcf5; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>مهرجان تجمع فان كوخ الفني</h1>
        <p>بإشراف الفنان طاهر دوهان</p>
    </div>

    <!-- قسم العداد التنازلي -->
    <div class="countdown-wrap">
        <div id="target-title" style="margin-bottom: 8px; font-size: 14px;">المتبقي على موعد 5 تموز</div>
        <div id="timer">
            <div class="t-box"><span id="days">0</span><span class="t-label">يوم</span></div>
            <div class="t-box"><span id="hours">0</span><span class="t-label">ساعة</span></div>
            <div class="t-box"><span id="minutes">0</span><span class="t-label">دقيقة</span></div>
            <div class="t-box"><span id="seconds">0</span><span class="t-label">ثانية</span></div>
        </div>
    </div>

    <form id="artForm">
        <div class="section-title">👤 المعلومات الشخصية</div>
        <div class="form-group">
            <label>الاسم الثلاثي للفنان:</label>
            <input type="text" id="name" required placeholder="مثال: أحمد علي محمد">
        </div>
        <div class="grid">
            <div class="form-group">
                <label>رقم الهاتف (واتساب):</label>
                <input type="tel" id="phone" required placeholder="07xxxxxxxxx">
            </div>
            <div class="form-group">
                <label>المحافظة:</label>
                <input type="text" id="city" required>
            </div>
        </div>
        <div class="grid">
            <div class="form-group">
                <label>العمر:</label>
                <input type="number" id="age" required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني (اختياري):</label>
                <input type="email" id="email">
            </div>
        </div>
        <div class="form-group">
            <label>حسابات التواصل (إنستكرام / فيسبوك):</label>
            <input type="text" id="social" placeholder="رابط الحساب أو اليوزر نيم" required>
        </div>

        <div class="section-title">🎨 معلومات العمل الفني</div>
        <div class="grid">
            <div class="form-group">
                <label>نوع المشاركة:</label>
                <select id="type" required>
                    <option value="">اختر...</option>
                    <option value="لوحة فنية">لوحة فنية</option>
                    <option value="تصوير">تصوير</option>
                    <option value="خط عربي">خط عربي</option>
                    <option value="نحت">نحت</option>
                    <option value="تصميم">تصميم</option>
                </select>
            </div>
            <div class="form-group">
                <label>عنوان العمل:</label>
                <input type="text" id="work_title" required>
            </div>
        </div>
        <div class="form-group">
            <label>وصف بسيط للعمل:</label>
            <textarea id="desc" rows="3" placeholder="تكلم عن فكرة عملك..."></textarea>
        </div>
        <div class="grid">
            <div class="form-group">
                <label>قياس العمل:</label>
                <input type="text" id="size" placeholder="مثلاً 50x70" required>
            </div>
            <div class="form-group">
                <label>عدد الأعمال:</label>
                <input type="number" id="count" value="1" min="1">
            </div>
        </div>
        <div class="form-group">
            <label>رفع صورة للعمل الفني (اختياري):</label>
            <input type="file" id="artwork_file" accept="image/*">
        </div>

        <div class="section-title">🛡️ أسئلة إضافية</div>
        <div class="form-group">
            <label>هل شاركت سابقاً في مهرجان فان كوخ؟</label>
            <select id="prev_part">
                <option value="لا">لا</option>
                <option value="نعم">نعم</option>
            </select>
        </div>
        <div class="form-group">
            <label>هل تملك هوية تجمع فان كوخ؟</label>
            <select id="has_id" onchange="toggleId()">
                <option value="لا">لا</option>
                <option value="نعم">نعم</option>
            </select>
        </div>
        <div id="id_num_container">
            <label>رقم هوية تجمع فان كوخ:</label>
            <input type="text" id="id_number" placeholder="اكتب رقم هويتك">
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">إرسال المشاركة الآن</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const TOKEN = '8982595964:AAE0M14bJX2pcy041A7cuy8C9CpnGZ8lCu4';
    const CHAT_ID = '395764615';

    // إظهار وإخفاء حقل الهوية
    function toggleId() {
        const hasId = document.getElementById('has_id').value;
        const container = document.getElementById('id_num_container');
        container.style.display = (hasId === 'نعم') ? 'block' : 'none';
    }

    // العداد التنازلي الذكي (يحدث نفسه تلقائياً)
    function updateCountdown() {
        const now = new Date();
        let targetYear = now.getFullYear();
        
        // ضبط تاريخ الهدف ليكون 5 تموز من السنة الحالية
        let targetDate = new Date(`July 5, ${targetYear} 00:00:00`);

        // إذا مر تاريخ 5 تموز في السنة الحالية، حول العداد للسنة القادمة
        if (now > targetDate) {
            targetYear++;
            targetDate = new Date(`July 5, ${targetYear} 00:00:00`);
        }

        const diff = targetDate - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = d;
        document.getElementById("hours").innerText = h;
        document.getElementById("minutes").innerText = m;
        document.getElementById("seconds").innerText = s;
        document.getElementById("target-title").innerText = `المتبقي على 5 تموز ${targetYear}`;
    }
    
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // إرسال البيانات للتليجرام
    document.getElementById('artForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#f1f5f9";
        status.innerText = "⏳ جاري إرسال بياناتك...";

        const msgText = `
🎨 *مشاركة جديدة - مهرجان فان كوخ*
--------------------------
👤 *الفنان:* ${document.getElementById('name').value}
📞 *الهاتف:* ${document.getElementById('phone').value}
📍 *المحافظة:* ${document.getElementById('city').value}
🎂 *العمر:* ${document.getElementById('age').value}
🔗 *التواصل:* ${document.getElementById('social').value}
📧 *الإيميل:* ${document.getElementById('email').value || '---'}
--------------------------
🖼️ *العمل:* ${document.getElementById('work_title').value}
🎭 *النوع:* ${document.getElementById('type').value}
📏 *القياس:* ${document.getElementById('size').value}
🔢 *العدد:* ${document.getElementById('count').value}
📝 *الوصف:* ${document.getElementById('desc').value || 'لا يوجد'}
--------------------------
✅ *مشاركة سابقة:* ${document.getElementById('prev_part').value}
🆔 *يملك هوية:* ${document.getElementById('has_id').value}
🔢 *رقم الهوية:* ${document.getElementById('id_number').value || '---'}
        `;

        try {
            // 1. إرسال النص
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msgText, parse_mode: 'Markdown' })
            });

            // 2. إرسال الصورة (إن وجدت)
            const fileInput = document.getElementById('artwork_file');
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', fileInput.files[0]);
                formData.append('caption', `صورة عمل الفنان: ${document.getElementById('name').value}`);
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            }

            status.style.background = "#dcfce7";
            status.style.color = "#166534";
            status.innerText = "✅ تم الإرسال بنجاح! شكراً لك.";
            document.getElementById('artForm').reset();
            toggleId();
        } catch (err) {
            status.style.background = "#fee2e2";
            status.style.color = "#991b1b";
            status.innerText = "❌ حدث خطأ في الإرسال، حاول مرة أخرى.";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
