<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهرجان فان كوخ - طاهر دوهان</title>
    <style>
        :root {
            --primary-blue: #00a8e8;
            --dark-blue: #2c3e50;
            --bg-color: #f4f7f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 700px;
            background: #fff;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-top: 8px solid var(--primary-blue);
        }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { max-width: 150px; height: auto; border-radius: 10px; }

        .header-top { text-align: center; margin-bottom: 25px; }
        .header-top h1 { color: var(--dark-blue); font-size: 24px; margin: 5px 0; }
        .designer { color: var(--primary-blue); font-weight: bold; font-size: 14px; }

        /* العداد التنازلي */
        .countdown-container {
            background: var(--dark-blue);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
        }
        #countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .time-box {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 5px;
            min-width: 60px;
        }
        .time-box span { display: block; font-size: 20px; font-weight: bold; }

        /* تنسيق الحقول */
        .section-title {
            background: #e1f5fe;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0 15px 0;
            color: var(--dark-blue);
            font-weight: bold;
            border-right: 5px solid var(--primary-blue);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus { border-color: var(--primary-blue); outline: none; }

        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        .btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        .btn-submit { background: var(--primary-blue); color: white; flex: 2; }
        .btn-print { background: #eee; color: #333; flex: 1; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* للطباعة */
        @media print {
            .countdown-container, .button-group { display: none !important; }
            .container { box-shadow: none; border: 1px solid #ddd; width: 100%; }
            body { background: white; }
        }

        @media (max-width: 500px) {
            .button-group { flex-direction: column; }
            #countdown { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <!-- سيحاول تحميل logo.png وإذا لم يجدها سيضع مساحة فارغة بدلاً من التعليق -->
        <img src="logo.png" alt="شعار المنظمة" onerror="this.style.display='none'">
    </div>

    <div class="header-top">
        <h1>مهرجان تجمع فان كوخ الفني</h1>
        <div class="designer">تم التصميم من قبل طاهر دوهان</div>
    </div>

    <div class="countdown-container">
        <small>المتبقي للمهرجان (5 تموز 2026)</small>
        <div id="countdown">
            <div class="time-box"><span id="days">00</span>يوم</div>
            <div class="time-box"><span id="hours">00</span>ساعة</div>
            <div class="time-box"><span id="minutes">00</span>دقيقة</div>
            <div class="time-box"><span id="seconds">00</span>ثانية</div>
        </div>
    </div>

    <!-- تم حذف enctype لتسريع عملية الإرسال ومنع التعليق -->
    <form id="artForm" action="https://formspree.io/f/xojblaon" method="POST">
        
        <div class="section-title">المعلومات الشخصية</div>
        
        <div class="form-group">
            <label>الاسم الثلاثي:</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف (واتساب):</label>
            <input type="text" name="phone" required>
        </div>

        <div class="form-group">
            <label>المحافظة:</label>
            <input type="text" name="city" required>
        </div>

        <div class="form-group">
            <label>رقم الهوية الفنية:</label>
            <input type="text" name="id_art" required>
        </div>

        <div class="form-group">
            <label>الرقم التسلسلي للبطاقة:</label>
            <input type="text" name="serial" required>
        </div>

        <div class="section-title">تفاصيل المشاركة</div>

        <div class="form-group">
            <label>نوع المشاركة:</label>
            <select name="type" required>
                <option value="لوحة فنية">لوحة فنية</option>
                <option value="تصوير">تصوير</option>
                <option value="خط عربي">خط عربي</option>
                <option value="نحت">نحت</option>
                <option value="تصميم">تصميم</option>
            </select>
        </div>

        <div class="form-group">
            <label>عنوان العمل الفني:</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>القياس:</label>
            <input type="text" name="size" placeholder="مثال: 50x70 سم" required>
        </div>

        <div class="form-group">
            <label>وصف العمل:</label>
            <textarea name="description"></textarea>
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-submit">إرسال التسجيل الآن 🚀</button>
            <button type="button" class="btn btn-print" onclick="window.print()">طباعة الوصل 🖨️</button>
        </div>

    </form>
</div>

<script>
    // برمجة العداد التنازلي بدقة
    function updateCountdown() {
        const target = new Date("July 5, 2026 00:00:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;

        if (diff <= 0) {
            document.getElementById("countdown").innerHTML = "انطلق المهرجان!";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = d;
        document.getElementById("hours").innerText = h;
        document.getElementById("minutes").innerText = m;
        document.getElementById("seconds").innerText = s;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // منع الإرسال المتكرر عند الضغط مرة واحدة
    document.getElementById('artForm').onsubmit = function() {
        const btn = this.querySelector('.btn-submit');
        btn.innerText = "جاري الإرسال...";
        btn.style.opacity = "0.5";
        btn.style.pointerEvents = "none";
    };
</script>

</body>
</html>
